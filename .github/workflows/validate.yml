name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  website:
    name: Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content and search data
        run: npm run validate:content-search

      - name: Run website validation
        run: npm run validate
